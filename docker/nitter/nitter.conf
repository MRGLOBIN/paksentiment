[Server]
address = "0.0.0.0"
port = 8080
https = false  # Set to true if behind a reverse proxy with HTTPS
httpMaxConnections = 100
staticDir = "./public"
title = "nitter"
hostname = "localhost"

[Cache]
listMinutes = 240  # How long to cache list info (timeline content)
rssMinutes = 10    # How long to cache RSS/Atom feeds
redisHost = "nitter-redis"  # Hostname of the Redis service in Docker Compose
redisPort = 6379
redisPassword = ""
redisConnections = 20  # Connection pool size
redisMaxConnections = 30

[Config]
hmacKey = "secretkey"  # Random key for cryptographic signing of video URLs
base64Media = false  # Set to true if you want to proxy media through base64 (slower)
enableRSS = true
enableDebug = false
proxyVideos = true
hlsPlayback = true
infiniteScroll = false
